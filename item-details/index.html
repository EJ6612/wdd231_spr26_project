<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- =============================================
         SEO Meta Tags
         ============================================= -->
    <meta name="description" content="Buy and sell items with fellow students. Find textbooks, electronics, furniture, and more.">
    <meta name="robots" content="index, follow">

    <!-- =============================================
         Open Graph Meta Tags
         Used by Facebook, LinkedIn, Discord, Slack,
         and most other social platforms when this
         page is shared as a link.
         ============================================= -->
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="#">
    <meta property="og:title"       content="Student Store">
    <meta property="og:description" content="Buy and sell items with fellow students.">
    <meta property="og:image"       content="#"><!-- Recommended: 1200×630px -->
    <meta property="og:site_name"   content="Student Store">
    <meta property="og:locale"      content="en_CA">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Store | Item Details</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="../js/populate_item_details.js" defer></script>
</head>
<body>

    <!-- =============================================
         HEADER
         Contains the site identity, search, and
         account controls.
         ============================================= -->
    <header>

        <h1><a href="../index.html">Student Store</a></h1>

        <form class="search-form" role="search" action="#" method="#">
            <input
                id="search-input"
                type="search"
                name="q"
                placeholder="Search listings..."
                aria-label="Search listings"
                >
            <button type="submit" aria-label="Submit search">🔎</button>
        </form>

        <!-- Account -->
        <nav class="account-nav" aria-label="Account">
            <a href="#" class="btn btn--account">😶</a>
        </nav>
        
    </header>

    <main>

    </main>

    <!-- =============================================
         FOOTER
         ============================================= -->
    <footer>

        <!-- Site name / brand -->
        <p class="footer-brand">Student Store</p>

        <!-- Copyright — JS can replace the year dynamically:
             document.querySelector('.footer__year').textContent = new Date().getFullYear(); -->
        <p class="footer-copyright">
            &copy; <span class="footer-year">2026</span> Student Store. All rights reserved.
        </p>

        <!-- Support / legal links -->
        <nav class="footer-links" aria-label="Support and legal links">
            <ul role="list">
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/privacy">Privacy Policy</a></li>
                <li><a href="/terms">Terms of Use</a></li>
            </ul>
        </nav>

    </footer>
    
</body>
</html>
