<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Student Store | Profile</title>


<meta 
name="description"
content="Manage your Student Store profile and listings.">


<link rel="stylesheet" href="../styles/homepage.css">
<link rel="stylesheet" href="../styles/header.css">
<link rel="stylesheet" href="../styles/footer.css">
<link rel="stylesheet" href="../styles/user.css">


<link
href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
rel="stylesheet">


<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

type="module"
src="../js/populate_user_feed.js"
defer>
</script>

<!-- ================= HEADER ================= -->


<header>


<div class="header-top">



<h1 class="site-logo">

<a href="../index.html">

Student Store

</a>

</h1>





<form class="search-form" role="search">


<button type="submit">

🔍

</button>


<input

id="search-input"

type="search"

placeholder="Search for textbooks, tech, furniture..."

aria-label="Search listings">


</form>






<nav class="account-nav">


<a

href="./index.html"

class="btn--account">


<span class="material-symbols-outlined">

account_circle

</span>


Account


</a>


</nav>




</div>







<nav class="main-nav">


<a href="../index.html">

Home

</a>



<a href="../browse/index.html">

Browse

</a>




<a href="../sell-new-item/index.html">

Sell

</a>





<a href="./index.html">

Profile

</a>





<a href="../about/index.html">

About

</a>



</nav>



</header>








<!-- ================= MAIN ================= -->


<main class="profile-page">





<!-- PROFILE -->

<section class="profile-section">


<div class="profile-card">



<div class="profile-avatar">


<img

src="../images/user.png"

alt="Profile photo">


</div>






<div class="profile-info">


<h2 id="profileName">

Daniel Nthengu

</h2>




<p id="profileMajor">

Computer Science • Senior

</p>




<p class="profile-meta">

Member since 2025

</p>





<div class="profile-stats">



<div>

<strong class="stat-number">

12

</strong>

<span class="stat-label">

Listings

</span>

</div>





<div>

<strong class="stat-number">

8

</strong>

<span class="stat-label">

Sold

</span>

</div>





<div>

<strong class="stat-number">

5

</strong>

<span class="stat-label">

Favorites

</span>

</div>



</div>




</div>







<div class="profile-actions">


<a

href="../sell-new-item/index.html"

class="btn-primary">

New Listing

</a>




<button

id="editProfileBtn"

class="btn-secondary">

Edit Profile

</button>



</div>






</div>


</section>








<!-- LISTINGS -->


<section class="profile-listings">



<div class="section-header">


<h2>

My Listings

</h2>


</div>







<ul

id="item-grid"

class="item-grid"

role="list">


<!-- JavaScript loads items -->

</ul>





</section>






</main>










<!-- ================= FOOTER ================= -->

<p class="footer__brand">

Student Store

</p>




<p class="footer__copyright">

2026

Student Store. All rights reserved.
